version: 2

updates:
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    labels: [dependencies, docker]
    commit-message:
      prefix: docker
    groups:
      docker-base:
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    labels: [dependencies, ci]
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:00"
    labels: [dependencies, python]
    commit-message:
      prefix: deps
    groups:
      python:
        patterns: ["*"]
