name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install ruff

      - name: Lint
        run: ruff check .

      - name: Import smoke test
        run: |
          python -c "import server; import clients.tracker; import clients.greenhouse; import clients.parser"

  scan:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with SBOM + provenance
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: anthropic-tracker-mcp:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.36.0
        with:
          image-ref: anthropic-tracker-mcp:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
